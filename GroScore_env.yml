name: GroScore
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10.20
  - numpy=2.2.5
  - scipy=1.15.3
  - conda-forge::openmm=8.5.0
  - conda-forge::pdbfixer=1.12
  - conda-forge::openbabel=3.1.1
  - conda-forge::rdkit=2025.09.5
  - conda-forge::openff-toolkit=0.16.10
  - conda-forge::openff-interchange=0.4.2
  - matplotlib-base=3.10.8
  - pandas=2.3.3
  # GROMACS 2026 cannot be installed in this environment: openbabel=3.1.1 requires
  # libxml2 <2.14, but gromacs=2026 requires libhwloc >=2.12.2 → libxml2 >=2.14.
  # Install GROMACS separately — see README for options.
