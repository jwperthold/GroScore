  - numpy>=2.2
  - scipy>=1.15
  - openmm>=8.5
  - pdbfixer>=1.12
  - openbabel>=3.1
  - rdkit>=2025.09
  - openff-toolkit>=0.16
  - openff-interchange>=0.4
  - gromacs>=2026        # CPU build; for GPU/MPI support install GROMACS separately
